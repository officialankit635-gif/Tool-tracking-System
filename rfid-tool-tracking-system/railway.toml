# Railway deployment config for the API backend.
# Root Directory should be set to "rfid-tool-tracking-system" in the Railway dashboard.
# The build command installs the whole pnpm workspace, then builds the API.
# The start command runs the compiled API bundle.

[build]
builder = "RAILPACK"
buildCommand = "pnpm install && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "node --enable-source-maps ./artifacts/api-server/dist/index.mjs"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
