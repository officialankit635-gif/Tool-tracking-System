# Railway deployment config for the API backend.
# In Railway, set "Root Directory" to "/" (repo root).
# The build command installs the whole pnpm workspace, then builds the API.
# The start command runs the compiled API bundle.

[build]
buildCommand = "pnpm install && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "node --enable-source-maps ./artifacts/api-server/dist/index.mjs"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
